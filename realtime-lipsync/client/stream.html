<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:640px; height:480px; background:#000; overflow:hidden; }
#out { display:block; width:640px; height:480px; }
#camPreview {
  position:fixed; bottom:4px; right:4px;
  width:160px; height:120px; border:1px solid #333; object-fit:cover;
}
#info {
  position:fixed; top:0; left:0; right:0;
  background:rgba(0,0,0,0.7); color:#0f0; font:12px monospace;
  padding:4px 8px; white-space:pre;
}
</style>
</head>
<body>
<canvas id="out" width="640" height="480"></canvas>
<div id="info">starting...</div>
<video id="cam" autoplay muted playsinline style="position:fixed;bottom:4px;right:4px;width:160px;height:120px;border:1px solid #333;object-fit:cover;"></video>

<script>
const WS_URL = 'ws://' + location.host + '/ws/deepfake';
const CAP_W  = 640, CAP_H = 480, FPS = 25, Q = 0.82;

const canvas = document.getElementById('out');
const ctx    = canvas.getContext('2d');
const info   = document.getElementById('info');
const cam = document.getElementById('cam');

const cap    = document.createElement('canvas');
cap.width = CAP_W; cap.height = CAP_H;
const capCtx = cap.getContext('2d');

let ws, rx = 0, tx = 0, t0 = Date.now();

function log(msg) { info.textContent = msg; }

// ── Receive & render ──────────────────────────────────────────────────────────
function renderFrame(data) {
  const u8 = new Uint8Array(data);
  // Verify JPEG magic bytes
  if (u8[0] !== 0xFF || u8[1] !== 0xD8) { log('bad JPEG'); return; }

  const blob = new Blob([u8], { type: 'image/jpeg' });
  createImageBitmap(blob)
    .then(bmp => {
      // Draw without touching canvas.width/height (avoids clearing)
      ctx.drawImage(bmp, 0, 0, canvas.width, canvas.height);
      bmp.close();
      rx++;
      const elapsed = (Date.now() - t0) / 1000;
      log('rx:' + rx + '  tx:' + tx + '  fps:' + (rx/elapsed).toFixed(1));
    })
    .catch(err => {
      // Fallback: use Image element
      const img = new Image();
      img.onload = () => { ctx.drawImage(img, 0, 0, canvas.width, canvas.height); URL.revokeObjectURL(img.src); rx++; };
      img.onerror = () => log('render error: ' + err);
      img.src = URL.createObjectURL(blob);
    });
}

// ── Send frames ───────────────────────────────────────────────────────────────
function send() {
  if (!ws || ws.readyState !== 1 || cam.readyState < 3) return;
  capCtx.drawImage(cam, 0, 0, CAP_W, CAP_H);
  cap.toBlob(blob => {
    if (blob && ws.readyState === 1) {
      blob.arrayBuffer().then(b => { ws.send(b); tx++; });
    }
  }, 'image/jpeg', Q);
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect() {
  log('connecting to ' + WS_URL);
  ws = new WebSocket(WS_URL);
  ws.binaryType = 'arraybuffer';
  ws.onopen    = () => { log('connected — waiting for frames...'); };
  ws.onmessage = (ev) => renderFrame(ev.data);
  ws.onclose   = () => { log('disconnected — reconnecting...'); setTimeout(connect, 1500); };
  ws.onerror   = (e) => { log('ws error'); ws.close(); };
}

// ── Camera ────────────────────────────────────────────────────────────────────
async function init() {
  log('requesting camera...');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: CAP_W, height: CAP_H, frameRate: FPS }, audio: false
    });
    cam.srcObject = stream;
    log('camera ok — connecting...');
    connect();
    setInterval(send, 1000 / FPS);
  } catch(e) {
    log('CAMERA ERROR: ' + e.message + '\n\nFix: chrome://flags → unsafely-treat-insecure-origin-as-secure\nAdd: http://' + location.host);
  }
}

init();
</script>
</body>
</html>
