# NGINX reverse proxy for the lip sync server.
# Required because browsers only allow webcam/mic access on HTTPS or localhost.
# Replace 'yourdomain.com' with your L40S instance's domain/IP + cert.

worker_processes 1;

events { worker_connections 1024; }

http {
    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name yourdomain.com;   # ← change this

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Large frames over WebSocket
        proxy_read_timeout    3600;
        proxy_send_timeout    3600;
        proxy_connect_timeout 60;

        location / {
            proxy_pass         http://lipsync-server:8000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;

            # Disable buffering for WebSocket / streaming
            proxy_buffering        off;
            proxy_cache            off;
        }
    }
}
