version: "3.9"

services:
  lipsync-server:
    build: .
    image: realtime-lipsync:latest
    container_name: lipsync-server
    restart: unless-stopped

    # NVIDIA GPU passthrough
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
      - MODEL_TYPE=musetalk
      - DEVICE=cuda
      - TARGET_FPS=25
      - AUDIO_SAMPLE_RATE=16000
      - MAX_CONNECTIONS=10
      - JPEG_QUALITY=85
      - LOG_LEVEL=info

    ports:
      - "8000:8000"   # WebSocket + HTTP server
      - "8001:8001"   # Metrics (optional)

    volumes:
      - ./models:/app/models          # Persist downloaded model weights
      - ./logs:/app/logs
      - /dev:/dev                      # For v4l2loopback virtual camera

    devices:
      - /dev/video0:/dev/video0        # Optional: pass through real camera too

    # v4l2loopback for virtual camera output on server
    privileged: false
    cap_add:
      - SYS_ADMIN                      # needed for v4l2loopback

    shm_size: "4gb"                    # Shared memory for CUDA/inference
    ulimits:
      memlock: -1
      stack: 67108864

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Optional: NGINX reverse proxy for TLS (needed for browser webcam access)
  nginx:
    image: nginx:alpine
    container_name: lipsync-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro   # Mount your TLS certs here
    depends_on:
      - lipsync-server

volumes:
  models:
